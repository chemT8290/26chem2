<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2026 화학Ⅱ 기말시험 대비 문항 PDF</title>
  <meta name="description" content="문제와 정답 PDF를 다운로드하고 웹페이지에서 바로 미리볼 수 있습니다." />
  <style>
    :root{
      --bg:#f6f8fb;
      --paper:#ffffff;
      --ink:#172033;
      --muted:#687385;
      --line:#dfe5ee;
      --brand:#2657d7;
      --brand-weak:#eaf0ff;
      --accent:#13a380;
      --shadow:0 14px 40px rgba(23,32,51,.10);
      --radius:20px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR","Apple SD Gothic Neo",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top left, rgba(38,87,215,.13), transparent 34rem),
        linear-gradient(180deg,#ffffff 0%,var(--bg) 42%);
      line-height:1.6;
    }
    a{color:inherit}
    .wrap{width:min(1180px,92vw);margin:0 auto}
    header{
      padding:48px 0 26px;
      text-align:center;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 14px;
      border:1px solid rgba(38,87,215,.18);
      border-radius:999px;
      color:var(--brand);
      background:var(--brand-weak);
      font-weight:700;
      font-size:.9rem;
    }
    h1{
      margin:18px 0 10px;
      font-size:clamp(1.9rem,4.6vw,3.2rem);
      line-height:1.18;
      letter-spacing:-.04em;
    }
    .lead{
      max-width:720px;
      margin:0 auto;
      color:var(--muted);
      font-size:1.05rem;
    }
    .quick-actions{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px;
      margin-top:26px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:44px;
      padding:10px 16px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--ink);
      text-decoration:none;
      font-weight:800;
      box-shadow:0 5px 16px rgba(23,32,51,.06);
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(23,32,51,.10);border-color:#c9d3e4}
    .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
    .btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:28px;
      padding:22px 0 54px;
    }
    .card{
      background:rgba(255,255,255,.86);
      border:1px solid rgba(223,229,238,.95);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter:blur(8px);
    }
    .card-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
      padding:22px 22px 18px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#fff,rgba(255,255,255,.78));
    }
    .card-title{margin:0;font-size:1.35rem;letter-spacing:-.02em}
    .meta{margin:4px 0 0;color:var(--muted);font-size:.95rem}
    .card-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}
    .viewer{
      width:100%;
      height:min(78vh,900px);
      min-height:560px;
      border:0;
      display:block;
      background:#eef2f7;
    }
    object.viewer{height:min(78vh,900px)}
    .fallback{
      min-height:360px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:34px;
      text-align:center;
      color:var(--muted);
    }
    .notice{
      margin:0 0 36px;
      padding:16px 18px;
      border:1px solid #e8dca5;
      border-radius:16px;
      background:#fff9dc;
      color:#5e4b00;
      font-size:.95rem;
    }
    footer{
      padding:26px 0 44px;
      color:var(--muted);
      font-size:.9rem;
      text-align:center;
    }
    @media (max-width:720px){
      header{padding-top:34px}
      .card-head{display:block;padding:18px}
      .card-actions{justify-content:flex-start;margin-top:14px}
      .btn{width:100%}
      .quick-actions .btn{width:auto}
      .viewer{height:70vh;min-height:420px}
    }
  </style>
</head>
<body>
  <header class="wrap">
    <span class="badge">PDF 자료실</span>
    <h1>2026 화학Ⅱ 기말시험 대비 문항</h1>
    <p class="lead">문제 PDF와 정답 PDF를 바로 다운로드하거나, 아래 미리보기 창에서 확인할 수 있습니다.</p>
    <nav class="quick-actions" aria-label="빠른 다운로드">
      <a class="btn primary" href="./26-Q.pdf" download="26-Q.pdf">문제 PDF 다운로드</a>
      <a class="btn accent" href="./26-A.pdf" download="26-A.pdf">정답 PDF 다운로드</a>
    </nav>
  </header>

  <main class="wrap">
    <p class="notice">미리보기가 보이지 않는 경우, 브라우저의 PDF 임베드 지원 문제일 수 있습니다. 이때는 다운로드 버튼 또는 새 탭으로 열기 버튼을 사용하세요. </p>

    <section class="grid" aria-label="PDF 미리보기와 다운로드">
      <article class="card" id="question">
        <div class="card-head">
          <div>
            <h2 class="card-title">문제 PDF</h2>
            <p class="meta">파일명: 26-Q.pdf</p>
          </div>
          <div class="card-actions">
            <a class="btn primary" href="./26-Q.pdf" download="26-Q.pdf">다운로드</a>
            <a class="btn" href="./26-Q.pdf" target="_blank" rel="noopener">새 탭으로 열기</a>
          </div>
        </div>
        <object class="viewer" data="./26-Q.pdf#view=FitH" type="application/pdf" aria-label="문제 PDF 미리보기">
          <div class="fallback">
            <p>이 브라우저에서는 PDF 미리보기를 지원하지 않습니다.<br><a href="./26-Q.pdf" download="26-Q.pdf">문제 PDF를 다운로드</a>하거나 <a href="./26-Q.pdf" target="_blank" rel="noopener">새 탭에서 열어</a> 확인하세요.</p>
          </div>
        </object>
      </article>

      <article class="card" id="answer">
        <div class="card-head">
          <div>
            <h2 class="card-title">정답 PDF</h2>
            <p class="meta">파일명: 26-A.pdf</p>
          </div>
          <div class="card-actions">
            <a class="btn accent" href="./26-A.pdf" download="26-A.pdf">다운로드</a>
            <a class="btn" href="./26-A.pdf" target="_blank" rel="noopener">새 탭으로 열기</a>
          </div>
        </div>
        <object class="viewer" data="./26-A.pdf#view=FitH" type="application/pdf" aria-label="정답 PDF 미리보기">
          <div class="fallback">
            <p>이 브라우저에서는 PDF 미리보기를 지원하지 않습니다.<br><a href="./26-A.pdf" download="26-A.pdf">정답 PDF를 다운로드</a>하거나 <a href="./26-A.pdf" target="_blank" rel="noopener">새 탭에서 열어</a> 확인하세요.</p>
          </div>
        </object>
      </article>
    </section>
  </main>

  <footer class="wrap">
    <p>개인 학습용으로만 사용하기 바랍니다.</p>
  </footer>
</body>
</html>
